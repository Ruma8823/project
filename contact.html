<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Shivani</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffd89b 0%, #ffc0cb 20%, #ff90d8 40%, #a8d8f0 60%, #87ceeb 80%, #ffffff 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 30px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #6c5ce7;
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(108, 92, 231, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #a29bfe;
            font-size: 1.15em;
            margin-bottom: 35px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .location-section {
            margin-bottom: 40px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 216, 155, 0.1) 0%, rgba(192, 203, 240, 0.1) 100%);
            border-radius: 20px;
            border-left: 5px solid #a8d8f0;
        }

        .location-title {
            color: #6c5ce7;
            font-size: 1.4em;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .location-title::before {
            content: "📍";
            margin-right: 12px;
            font-size: 1.3em;
        }

        .location-section p {
            color: #333;
            font-size: 1.05em;
            margin: 0 0 15px 0;
        }

        iframe {
            border: 0;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(162, 155, 254, 0.2);
            width: 100%;
        }

        .contact-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(162, 155, 254, 0.2);
        }

        .contact-item {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 216, 155, 0.08) 0%, rgba(192, 203, 240, 0.08) 100%);
            border-radius: 15px;
            border-left: 4px solid #a29bfe;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: linear-gradient(135deg, rgba(255, 216, 155, 0.15) 0%, rgba(192, 203, 240, 0.15) 100%);
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(162, 155, 254, 0.15);
        }

        .contact-label {
            color: #6c5ce7;
            font-weight: 600;
            min-width: 120px;
            font-size: 1.08em;
            display: flex;
            align-items: center;
        }

        .contact-value {
            color: #333;
            font-size: 1.08em;
            display: flex;
            align-items: center;
        }

        .contact-value a {
            color: #a29bfe;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(.25, .8, .25, 1);
            font-weight: 500;
        }

        .contact-value a:hover {
            color: #6c5ce7;
            transform: scale(1.08);
            text-decoration: underline;
        }

        .icon {
            margin-right: 10px;
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✨ Contact Me ✨</h1>
        <p class="subtitle">Let's connect and create something amazing together!</p>

        <div class="location-section">
            <div class="location-title">Location</div>
            <p>Ambala, Haryana, India</p>
            <iframe src="https://maps.google.com/maps?q=Ambala%2C%20Haryana%2C%20India&z=13&output=embed" width="100%"
                height="350" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="contact-section">
            <div class="contact-item">
                <span class="contact-label">📱 Phone:</span>
                <span class="contact-value">+91-9996989745</span>
            </div>

            <div class="contact-item">
                <span class="contact-label">📧 Email:</span>
                <span class="contact-value">
                    <a href="mailto:shivanimehra1914@gmail.com">
                        shivanimehra1914@gmail.com
                    </a>
                </span>
            </div>

            <div class="contact-item">
                <span class="contact-label">📸 Instagram:</span>
                <span class="contact-value">
                    <a href="https://www.instagram.com/shivi__m1206/" target="_blank">
                        @shivi__m1206
                    </a>
                </span>
            </div>
        </div>
    </div>
</body>

</html>
